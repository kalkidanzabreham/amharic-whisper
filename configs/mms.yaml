model:
  name: "facebook/mms-1b-fl102"
  language: "amh"
  task: "transcribe"

data:
  train_csv: "/content/drive/MyDrive/amharic-whisper/data/train.csv"
  val_csv:   "/content/drive/MyDrive/amharic-whisper/data/val.csv"
  audio_column: "audio_path"
  text_column:  "text"
  sample_rate:  16000

training:
  output_dir: "/content/drive/MyDrive/amharic-whisper/checkpoints/mms-amharic"
  batch_size: 4
  eval_batch_size: 4
  learning_rate: 0.00005
  warmup_steps: 50
  max_steps: 1000
  gradient_checkpointing: true
  fp16: true
  save_steps: 250
  eval_steps: 250
  logging_steps: 25
  save_total_limit: 2

output:
  final_model_dir: "/content/drive/MyDrive/amharic-whisper/mms-amharic-final"
