model:
  name: "facebook/mms-1b-fl102"   # ✅ correct repo
  language: "amh"
  task: "transcribe"

training:
  output_dir: "/content/drive/MyDrive/amharic-whisper/checkpoints/mms-amharic"
  batch_size: 4              # 1b model is bigger — reduce batch size to fit GPU
  eval_batch_size: 4
  learning_rate: 0.00005     # lower than before — 1b model is more sensitive
  warmup_steps: 50
  max_steps: 1000            # fewer steps — already knows Amharic well
  gradient_checkpointing: true
  fp16: true
  save_steps: 250
  eval_steps: 250
  logging_steps: 25
  save_total_limit: 2

output:
  final_model_dir: "/content/drive/MyDrive/amharic-whisper/mms-amharic-final"